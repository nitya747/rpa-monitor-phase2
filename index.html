<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Density Enterprise RPA Monitor</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="description" content="High-Density Enterprise RPA Monitor is a high-performance, real-time virtualized dashboard for tracking large-scale RPA pipelines and automations." />
    <!-- Load Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- Inject the official hackathon pipeline script -->
    <script src="./dataStream.js"></script>
    <style>
        #terminal-container { font-family: monospace; color: #38bdf8; }
        #terminal { background: #020617; border: 1px solid #1e293b; padding: 15px; border-radius: 6px; height: 150px; overflow-y: auto; font-family: monospace; color: #38bdf8; }
        .success { color: #4ade80; }
    </style>
</head>
<body>

    <!-- React App Mount Root -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Real-time UI snapshot widget (from user's updated index.html) -->
    <div id="terminal-container" style="max-width: 1200px; margin: 3rem auto 1rem auto; padding: 0 1.5rem; box-sizing: border-box; clear: both;">
        <h2 style="font-family: monospace; color: #38bdf8; font-size: 1.2rem; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #1e293b; padding-bottom: 0.25rem;">📡 Pipeline Telemetry Feed (Harness)</h2>
        <div id="terminal">Initializing pipeline logs...</div>
    </div>

    <!-- Inject your local harness script -->
    <script>
        const terminalEl = document.getElementById('terminal');
        let totalTicks = 0;

        console.log("📡 [Harness] Connecting to global initialization hook...");

        // Fire the pipeline using the path of the local CSV file
        window.initializeRpaStream((incomingBatch) => {
            totalTicks++;

            // Example Reflection of the data footprint onto the UI viewport
            terminalEl.innerHTML = `
                <p class="success" style="margin: 4px 0;">✅ Connection Live: Stream active.</p>
                <p style="margin: 4px 0;">Total Intervals Received: <strong>${totalTicks}</strong></p>
                <p style="margin: 4px 0;">Latest Payload Size: <strong>${incomingBatch.length} rows</strong></p>
                <p style="margin: 4px 0;">Sample Row 0 ID: <span style="color: #fbbf24;">${incomingBatch[0]?.internal_uid || 'N/A'}</span></p>
                <p style="margin: 4px 0;">Sample Row 0 Savings: <span style="color: #e2e8f0;">$${incomingBatch[0]?.annual_savings_usd?.toLocaleString() || 0}</span></p>
            `;
        }, './automation_projects.csv'); // The file path
    </script>
</body>
</html>
